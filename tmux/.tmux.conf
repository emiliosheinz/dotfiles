# Hot reload configuration with prefix + r
unbind r
bind r source-file ~/.tmux.conf

# Set prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g mouse on
set -g base-index 1
set -g renumber-windows on
set -g mode-keys vi
set -g detach-on-destroy off  # don't exit tmux when the last window closes
set -g set-clipboard on
set -g automatic-rename on
# To add a tool: wrap with #{s/name-pattern/display-name/:...} or add a #{?...} branch for nvim-style (cmd + dir)
set -g automatic-rename-format '#{?#{==:#{pane_current_command},nvim},nvim-#{b:pane_current_path},#{s/opencode[^ ]*/opencode/:#{s/^[0-9][0-9.]*[0-9]$/claude/:#{pane_current_command}}}}'
set -g status-position top

# Terminal capabilities
set -g default-terminal "tmux-256color"
set -as terminal-features 'xterm*:RGB:sync'
set -as terminal-features 'tmux*:RGB:sync'

# Reduce escape sequence weirdness
set -sg escape-time 10

# Keybindings
bind-key v split-window -h
bind-key h split-window -v
bind-key c switch-client -T create
bind-key -T create c new-window -c "#{pane_current_path}"
bind-key -T create h new-window -c "~"
bind-key -T create o display-popup -E -w 40% -h 40% -b rounded -T " Open folder " -S "fg=#{@thm_lavender}" 'dir=$(find ~/dev -mindepth 1 -maxdepth 1 -type d -not -name ".*" | sort | fzf --prompt="folder: " --with-nth=-1 --delimiter="/") && tmux new-window -c "$dir"'
bind-key X kill-window
bind-key x kill-pane
bind-key m resize-pane -Z

# Open a backstage session scoped to the current workspace and path
bind-key a if-shell \
  'case "#{session_name}" in backstage-*) true;; *) false;; esac' \
  'run-shell "ws backstage leave \"#{session_name}\" \"#{client_type}\""' \
  'run-shell "ws backstage enter \"#{session_name}\" \"#{pane_current_path}\""'

bind-key w switch-client -T workspace
bind-key -T workspace w display-popup -E -w 40% -h 40% -b rounded -T " Workspaces " -S "fg=#{@thm_lavender}" "ws switch"
bind-key -T workspace k display-popup -E -w 40% -h 40% -b rounded -T " Kill workspace " -S "fg=#{@thm_red}" "ws kill"

bind-key l switch-client -T lazy
bind-key -T lazy g display-popup -E -B -w 100% -h 100% -d "#{pane_current_path}" lazygit
bind-key -T lazy d display-popup -E -B -w 100% -h 100% -d "#{pane_current_path}" lazydocker
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Swap windows with H and L
bind-key H swap-window -t :-1 \; select-window -t :-1
bind-key L swap-window -t :+1 \; select-window -t :+1

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'

set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_status_background "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"

set -g @continuum-restore 'on'

run ~/.config/tmux/plugins/tmux/catppuccin.tmux

# Status bar
set -g status-left-length 100
set -g status-justify left
set -g status-left "#[fg=#{?client_prefix,#{@thm_red},#{@thm_green}}]#[fg=#{@thm_crust},bg=#{?client_prefix,#{@thm_red},#{@thm_green}}] #[fg=#{@thm_fg},bg=#{@thm_surface_0}] #{session_name}#[fg=#{@thm_surface_0},bg=default] "
set -g status-right ""
set -g window-status-separator " "
set -g window-status-format "#[fg=#{@thm_overlay_1}]#I:#W"
set -g window-status-current-format "#[fg=#{@thm_fg},bold]#I:#W"

# Initialize TMUX plugin manager (keep at bottom)
run ~/.tmux/plugins/tpm/tpm
