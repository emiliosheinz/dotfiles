# Hot reload configuration with prefix + r
unbind r
bind r source-file ~/.tmux.conf

# Set prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

set -g mouse on
set -g base-index 1
set -g renumber-windows on
set -g mode-keys vi
set -g detach-on-destroy off  # don't exit tmux when the last window closes
set -g set-clipboard on
set -g allow-rename off
set -g automatic-rename off
set -g status-position top

# Keybindings
bind-key v split-window -h
bind-key h split-window -v -l "25%"
bind-key X kill-window
bind-key x kill-pane
bind-key m resize-pane -Z

# Open a backstage session scoped to the current workspace and path
bind-key a run-shell '\
  case "#{session_name}" in backstage-*) \
    tmux display-message "Cannot open backstage from within a backstage session"; exit 0;; \
  esac; \
  SESSION="backstage-#{session_name}-$(basename #{pane_current_path} | tr -cs '[:alnum:]_-' '-' | tr '[:upper:]' '[:lower:]' | sed 's/-*$//')"; \
  tmux has-session -t "$SESSION" 2>/dev/null || \
  tmux new-session -d -s "$SESSION" -c "#{pane_current_path}"; \
  tmux display-popup -B -w 100% -h 100% -E "tmux attach-session -t $SESSION"'

bind-key w switch-client -T workspace
bind-key -T workspace w display-popup -E -w 60% -h 60% "tmux-workspace-manager switch"
bind-key -T workspace k display-popup -E -w 60% -h 40% "tmux-workspace-manager kill"

bind-key l switch-client -T lazy
bind-key -T lazy g display-popup -E -B -w 100% -h 100% -d "#{pane_current_path}" lazygit
bind-key -T lazy d display-popup -E -B -w 100% -h 100% -d "#{pane_current_path}" lazydocker
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'

set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_status_background "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"

set -g @continuum-restore 'on'

run ~/.config/tmux/plugins/tmux/catppuccin.tmux

# Status bar
set -g status-left-length 100
set -g status-justify left
set -g status-left "#[fg=#{?client_prefix,#{@thm_red},#{@thm_green}}]#[fg=#{@thm_crust},bg=#{?client_prefix,#{@thm_red},#{@thm_green}}] #[fg=#{@thm_fg},bg=#{@thm_surface_0}] #{session_name}#[fg=#{@thm_surface_0},bg=default] "
set -g status-right ""
set -g window-status-separator " "
set -g window-status-format "#[fg=#{@thm_overlay_1}]#I:#(~/.local/scripts/tmux-window-name #{pane_tty})"
set -g window-status-current-format "#[fg=#{@thm_fg},bold]#I:#(~/.local/scripts/tmux-window-name #{pane_tty})"

# Initialize TMUX plugin manager (keep at bottom)
run ~/.tmux/plugins/tpm/tpm
